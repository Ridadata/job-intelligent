version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "job-etl-secret-key-2026"
    SUPABASE_URL: ${SUPABASE_URL}
    SUPABASE_KEY: ${SUPABASE_KEY}
    REDIS_URL: redis://redis:6379/0
    SBERT_MODEL: ${SBERT_MODEL:-all-MiniLM-L6-v2}
    SPACY_MODEL: ${SPACY_MODEL:-fr_core_news_md}
    ADZUNA_APP_ID: ${ADZUNA_APP_ID}
    ADZUNA_APP_KEY: ${ADZUNA_APP_KEY}
    JSEARCH_API_KEY: ${JSEARCH_API_KEY}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./etl:/opt/airflow/etl
    - ./scrapers:/opt/airflow/scrapers
    - ./ingestion:/opt/airflow/ingestion
    - ./pipeline:/opt/airflow/pipeline
    - airflow-logs:/opt/airflow/logs
  depends_on:
    airflow-db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ── Airflow metadata database ─────────────────────────────────────────────
  airflow-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  # ── Airflow init (run migrations) ─────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate && airflow users create
      --username admin --password admin --firstname Admin
      --lastname User --role Admin --email admin@example.com || true"
    restart: "no"

  # ── Airflow webserver ─────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow scheduler ────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── FastAPI application ───────────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      REDIS_URL: redis://redis:6379/0
      SBERT_MODEL: ${SBERT_MODEL:-all-MiniLM-L6-v2}
      SPACY_MODEL: ${SPACY_MODEL:-fr_core_news_md}
      API_DEBUG: ${API_DEBUG:-false}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY}
      JSEARCH_API_KEY: ${JSEARCH_API_KEY}
    volumes:
      - ./api:/app/api
      - ./etl:/app/etl
      - ./ingestion:/app/ingestion
      - ./ai_services:/app/ai_services
      - ./tests:/app/tests
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  airflow-db-data:
  airflow-logs:
  redis-data:
